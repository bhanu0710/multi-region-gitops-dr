namespace: dr-demo

image:
  repository: bhanu0710/dr-demo-backend
  tag: stable
  pullPolicy: IfNotPresent

clusterRole: primary
awsRegion: ap-south-1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: dr-demo.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
