apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dr-demo-secondary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bhanu0710/multi-region-gitops-dr.git
    targetRevision: main
    path: helm/dr-demo
    helm:
      parameters:
        - name: clusterRole
          value: secondary
        - name: awsRegion
          value: us-east-1
        - name: ingress.host
          value: secondary.dr-demo.example.com
  destination:
    # Replace with your secondary EKS cluster endpoint from:
    # aws eks describe-cluster --name dr-secondary --region us-east-1 --query cluster.endpoint --output text
    # Then register it with ArgoCD: argocd cluster add <kubectl-context-name>
    server: https://<SECONDARY-CLUSTER-ENDPOINT>
    namespace: dr-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
